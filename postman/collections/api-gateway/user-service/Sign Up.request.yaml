$kind: http-request
name: Sign Up
method: POST
url: "{{apiGatewayBaseUrl}}/api/users/signup"
order: 1777222306067
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "alice@example.com",
      "password": "password123",
      "firstName": "Alice",
      "lastName": "Smith"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = JSON.parse(pm.response.body);

          pm.environment.set("accessToken", body.accessToken);
          pm.environment.set("refreshToken", body.refreshToken);
          pm.environment.set("expiresIn", body.expiresIn);

          let [ , jwtPayload, ] = body.accessToken.split('.');
          let jwtPayloadJsonString = atob(jwtPayload);
          let jwtPayloadJson = JSON.parse(jwtPayloadJsonString);
          
          pm.environment.set("userId", jwtPayloadJson.sub);
      }
    language: text/javascript

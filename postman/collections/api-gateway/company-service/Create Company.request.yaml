$kind: http-request
name: Create Company
method: POST
url: "{{apiGatewayBaseUrl}}/api/companies"
order: 1777222513797
headers:
  - key: Content-Type
    value: application/json
auth:
  credentials:
    - key: token
      value: "{{accessToken}}"
  type: bearer
body:
  type: json
  content: |-
    {
      "name": "Acme Corporation",
      "registrationNumber": "REG-2026-001",
      "street": "123 Main Street",
      "city": "San Francisco",
      "postalCode": "94102",
      "country": "USA",
      "ownerDisplayName": "John Founder"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = JSON.parse(pm.response.body);

          pm.environment.set("companyId", body.id);
      }
    language: text/javascript

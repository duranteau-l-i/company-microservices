server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/companies/**
        - id: officer-service
          uri: lb://officer-service
          predicates:
            - Path=/api/officers/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

app:
  security:
    public-paths:
      - /api/users/signup
      - /api/users/signin
      - /api/users/auth/refresh
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    urls:
      - name: user-service
        url: http://localhost:8081/v3/api-docs
      - name: company-service
        url: http://localhost:8082/v3/api-docs
      - name: officer-service
        url: http://localhost:8083/v3/api-docs

---
spring:
  config:
    activate:
      on-profile: docker

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: http://user-service:8081/v3/api-docs
      - name: company-service
        url: http://company-service:8082/v3/api-docs
      - name: officer-service
        url: http://officer-service:8083/v3/api-docs

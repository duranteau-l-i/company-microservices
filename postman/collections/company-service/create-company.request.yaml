$kind: http-request
name: Create Company
method: POST
url: "{{companyServiceBaseUrl}}/api/companies"
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = JSON.parse(pm.response.body);

          const companyId = body.id;

          pm.environment.set("companyId", companyId);
      }
    language: text/javascript
order: 4000
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
body:
  type: json
  content: |-
    {
      "name": "Acme Corporation",
      "registrationNumber": "REG-2026-001",
      "street": "123 Main Street",
      "city": "San Francisco",
      "postalCode": "94102",
      "country": "USA",
      "ownerDisplayName": "John Founder"
    }

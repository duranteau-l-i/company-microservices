server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs/**
              filters:
                - RewritePath=/user-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/api/companies/**
            - id: company-service-docs
              uri: lb://company-service
              predicates:
                - Path=/company-service/v3/api-docs/**
              filters:
                - RewritePath=/company-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
            - id: officer-service
              uri: lb://officer-service
              predicates:
                - Path=/api/officers/**
            - id: officer-service-docs
              uri: lb://officer-service
              predicates:
                - Path=/officer-service/v3/api-docs/**
              filters:
                - RewritePath=/officer-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

app:
  security:
    public-paths:
      - /api/users/signup
      - /api/users/signin
      - /api/users/refresh
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /user-service/v3/api-docs/**
      - /company-service/v3/api-docs/**
      - /officer-service/v3/api-docs/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: company-service
        url: /company-service/v3/api-docs
      - name: officer-service
        url: /officer-service/v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: INFO
